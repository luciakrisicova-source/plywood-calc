<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kalkulačka dreva</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1f2937">
</head>
<body>
<main class="app">
  <section class="card">
    <h1>Kalkulačka dreva</h1>
    <p class="subtitle">Vyber typ výpočtu</p>

    <div class="tabs">
      <button class="tab active" id="tabSkarovky">Škárovky</button>
      <button class="tab" id="tabProfil">Tatranský profil</button>
    </div>

    <section id="skarovkyPanel">
      <h2>Škárovky</h2>

      <label>Dĺžka (mm)</label>
      <input id="skDlzka" type="number" placeholder="napr. 4000">

      <label>Šírka (mm)</label>
      <input id="skSirka" type="number" placeholder="napr. 150">

      <label>Hrúbka (mm)</label>
      <input id="skHrubka" type="number" placeholder="napr. 25">

      <label>Počet kusov</label>
      <input id="skPocet" type="number" placeholder="napr. 10">

      <label>Cena za 1 kus (€)</label>
      <input id="skCenaKs" type="number" step="0.01" placeholder="napr. 4.50">

      <button id="vypocitatSkarovky" class="primary">Vypočítať</button>

      <section class="results">
        <h3>Výsledok do eKasy</h3>

        <div class="result-line highlight">
          <span>Celkové kubíky:</span>
          <strong id="skKubiky">–</strong>
        </div>

        <div class="result-line highlight">
          <span>Cena za 1 m³:</span>
          <strong id="skCenaM3">–</strong>
        </div>
      </section>
    </section>

    <section id="profilPanel" class="hidden">
      <h2>Tatranský profil</h2>

      <label>Dĺžka (mm)</label>
      <input id="tpDlzka" type="number" placeholder="napr. 4000">

      <label>Šírka (mm)</label>
      <input id="tpSirka" type="number" placeholder="napr. 120">

      <label>Cena za 1 m² (€)</label>
      <input id="tpCenaM2" type="number" step="0.01" placeholder="napr. 12.50">

      <label>Počet kusov</label>
      <input id="tpPocet" type="number" placeholder="napr. 20">

      <button id="vypocitatProfil" class="primary">Vypočítať</button>

      <section class="results">
        <h3>Výsledok</h3>

        <div class="result-line">
          <span>Plocha 1 ks:</span>
          <strong id="tpPlochaKs">–</strong>
        </div>

        <div class="result-line highlight">
          <span>Cena za 1 ks:</span>
          <strong id="tpCenaKs">–</strong>
        </div>

        <div class="result-line highlight">
          <span>Celková cena:</span>
          <strong id="tpCenaSpolu">–</strong>
        </div>
      </section>
    </section>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
